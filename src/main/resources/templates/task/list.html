<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('任务列表')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar('tasks')}"></div>

<div class="main-wrap">
    <div class="topbar">
        <span class="topbar-title"><i class="bi bi-list-task me-2"></i>部署任务列表</span>
        <a href="/repositories" class="btn btn-primary btn-sm">
            <i class="bi bi-rocket me-1"></i>发起新任务
        </a>
    </div>
    <div class="page-content">

        <!-- 统计卡片 -->
        <div class="row g-3 mb-4" id="statCards">
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="fs-2 fw-bold text-primary" id="statTotal">-</div>
                    <div class="text-muted small mt-1">全部任务</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="fs-2 fw-bold" style="color:#92400e" id="statPending">-</div>
                    <div class="text-muted small mt-1">待处理</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="fs-2 fw-bold" style="color:#1e40af" id="statRunning">-</div>
                    <div class="text-muted small mt-1">执行中</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center py-3">
                    <div class="fs-2 fw-bold" style="color:#065f46" id="statSuccess">-</div>
                    <div class="text-muted small mt-1">已完成</div>
                </div>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between">
                <span><i class="bi bi-table me-2"></i>任务列表（最近 10 条）</span>
                <button class="btn btn-sm btn-outline-primary" onclick="loadTasks()">
                    <i class="bi bi-arrow-clockwise me-1"></i>刷新
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th style="width:60px">ID</th>
                            <th>仓库路径</th>
                            <th>源路径</th>
                            <th>Commit</th>
                            <th style="width:90px">状态</th>
                            <th>创建时间</th>
                            <th>处理时间</th>
                            <th style="width:120px">操作</th>
                        </tr>
                        </thead>
                        <tbody id="taskTbody">
                        <tr><td colspan="8" class="text-center py-4 text-muted">
                            <i class="bi bi-arrow-repeat spin me-1"></i>加载中…
                        </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
</style>
<script>
    const STATUS_MAP = {
        PENDING: {label: '待处理', cls: 'badge-pending'},
        RUNNING: {label: '执行中', cls: 'badge-running'},
        SUCCESS: {label: '已完成', cls: 'badge-success'},
        COMPLETED: {label: '已完成', cls: 'badge-success'},
        FAILED:  {label: '失败',   cls: 'badge-failed'},
        ERROR:   {label: '出错',   cls: 'badge-failed'},
    };

    function statusBadge(s) {
        const info = STATUS_MAP[s?.toUpperCase()] || {label: s || '-', cls: 'badge-pending'};
        return `<span class="badge-status ${info.cls}">${info.label}</span>`;
    }

    async function loadTasks() {
        const tbody = document.getElementById('taskTbody');
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-muted"><i class="bi bi-arrow-repeat spin me-1"></i>加载中…</td></tr>`;
        try {
            const res = await fetch('/api/tasks');
            const json = await res.json();
            const {list = [], total = 0} = json.data || {};

            // 更新统计
            document.getElementById('statTotal').textContent = total;
            let pending = 0, running = 0, success = 0;
            list.forEach(t => {
                const s = (t.status || '').toUpperCase();
                if (s === 'PENDING') pending++;
                else if (s === 'RUNNING') running++;
                else if (s === 'SUCCESS' || s === 'COMPLETED') success++;
            });
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statRunning').textContent = running;
            document.getElementById('statSuccess').textContent = success;

            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-5 text-muted"><i class="bi bi-inbox fs-3 d-block mb-2"></i>暂无任务</td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(t => `
                <tr>
                    <td><strong>#${t.id}</strong></td>
                    <td style="max-width:160px"><code class="small text-break">${t.repoPath || '-'}</code></td>
                    <td style="max-width:150px"><small class="text-break">${t.sourcePath || '-'}</small></td>
                    <td><span class="badge bg-secondary font-monospace" style="font-size:.75rem">${t.commitHash ? t.commitHash.slice(0,8) : '-'}</span></td>
                    <td>${statusBadge(t.status)}</td>
                    <td><small class="text-muted">${fmtDate(t.createdAt)}</small></td>
                    <td><small class="text-muted">${fmtDate(t.processedAt)}</small></td>
                    <td>
                        <a href="/tasks/${t.id}" class="btn btn-sm btn-outline-primary" title="查看详情">
                            <i class="bi bi-eye"></i>
                        </a>
                        ${(t.status||'').toUpperCase() !== 'RUNNING' ? `
                        <button class="btn btn-sm btn-outline-warning ms-1" onclick="retryTask(${t.id})" title="重新执行">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </button>` : ''}
                        <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteTask(${t.id})" title="删除任务">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>`).join('');
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-danger"><i class="bi bi-exclamation-circle me-1"></i>加载失败，请稍后重试</td></tr>`;
        }
    }

    async function retryTask(id) {
        if (!confirm(`确认重新执行任务 #${id}？`)) return;
        try {
            const res = await fetch(`/api/${id}/retry`, {method: 'POST'});
            const json = await res.json();
            showToast(json.data || '任务已重新提交', 'success');
            setTimeout(loadTasks, 800);
        } catch (e) {
            showToast('操作失败', 'error');
        }
    }

    async function deleteTask(id) {
        if (!confirm(`确认删除任务 #${id}？此操作不可恢复！`)) return;
        try {
            const res = await fetch(`/api/tasks/${id}`, {method: 'DELETE'});
            const json = await res.json();
            showToast('删除成功', 'success');
            setTimeout(loadTasks, 300);
        } catch (e) {
            showToast('删除失败', 'error');
        }
    }

    function fmtDate(v) {
        if (!v) return '-';
        return String(v).replace('T', ' ').slice(0, 19);
    }

    loadTasks();
    // 每30秒自动刷新
    setInterval(loadTasks, 30000);
</script>
</body>
</html>
