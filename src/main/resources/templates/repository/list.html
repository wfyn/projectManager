<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Git 仓库')}"></head>
<body>
<div th:replace="~{fragments/layout :: sidebar('repositories')}"></div>

<div class="main-wrap">
    <div class="topbar">
        <span class="topbar-title"><i class="bi bi-git me-2"></i>Git 仓库管理</span>
        <a href="/repositories/add" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>新增仓库
        </a>
    </div>
    <div class="page-content">

        <!-- 搜索栏 -->
        <div class="card mb-4">
            <div class="card-body py-3">
                <div class="row g-2 align-items-center">
                    <div class="col-md-5">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                            <input type="text" id="keyword" class="form-control" placeholder="搜索仓库名称 / 路径 / 远程URL…">
                        </div>
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-primary btn-sm" onclick="loadRepos(1)">
                            <i class="bi bi-search me-1"></i>搜索
                        </button>
                        <button class="btn btn-outline-secondary btn-sm ms-1" onclick="document.getElementById('keyword').value='';loadRepos(1)">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>重置
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 仓库列表 -->
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between">
                <span><i class="bi bi-table me-2"></i>仓库列表</span>
                <span class="text-muted fs-6 fw-normal" id="totalTip"></span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>仓库名称</th>
                            <th>本地路径</th>
                            <th>远程 URL</th>
                            <th>分支</th>
                            <th>Webplus 版本</th>
                            <th>最后扫描</th>
                            <th style="width:160px">操作</th>
                        </tr>
                        </thead>
                        <tbody id="repoTbody">
                        <tr>
                            <td colspan="7" class="text-center py-4 text-muted">
                                <i class="bi bi-arrow-repeat spin me-1"></i>加载中…
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- 分页 -->
            <div class="card-footer bg-white d-flex justify-content-end align-items-center gap-3">
                <span class="text-muted small" id="pageInfo"></span>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
</style>
<script>
    let currentPage = 1, totalPages = 1;

    async function loadRepos(page = 1) {
        currentPage = page;
        const keyword = document.getElementById('keyword').value.trim();
        const tbody = document.getElementById('repoTbody');
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted"><i class="bi bi-arrow-repeat spin me-1"></i>加载中…</td></tr>`;

        try {
            const res = await fetch('/api/repositories', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({page, size: 10, keyword})
            });
            const json = await res.json();
            const {list = [], total = 0} = json.data || {};
            totalPages = Math.max(1, Math.ceil(total / 10));

            document.getElementById('totalTip').textContent = `共 ${total} 条`;
            document.getElementById('pageInfo').textContent = `第 ${page} / ${totalPages} 页`;
            renderPagination();

            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-muted"><i class="bi bi-inbox fs-3 d-block mb-2"></i>暂无数据</td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(r => `
                <tr>
                    <td><strong>${r.repoName || '-'}</strong>${r.description ? `<br><small class="text-muted">${r.description}</small>` : ''}</td>
                    <td class="text-break" style="max-width:180px"><code class="small">${r.repoPath || '-'}</code></td>
                    <td class="text-break" style="max-width:180px"><small>${r.remoteUrl || '-'}</small></td>
                    <td><span class="badge bg-secondary">${r.branch || 'main'}</span></td>
                    <td>${r.webplusVersion ? `<span class="badge bg-info text-dark">${r.webplusVersion}</span>` : '-'}</td>
                    <td><small class="text-muted">${r.lastScanTime ? r.lastScanTime.replace('T', ' ') : '-'}</small></td>
                    <td>
                        <a href="/repositories/${r.id}/commits" class="btn btn-sm btn-outline-primary" title="查看提交">
                            <i class="bi bi-clock-history"></i>
                        </a>
                        <a href="/repositories/edit/${r.id}" class="btn btn-sm btn-outline-secondary ms-1" title="编辑">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteRepo(${r.id})" title="删除">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>`).join('');
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger"><i class="bi bi-exclamation-circle me-1"></i>加载失败，请稍后重试</td></tr>`;
        }
    }

    function renderPagination() {
        const ul = document.getElementById('pagination');
        let html = `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="loadRepos(${currentPage - 1})">«</a></li>`;
        for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
            html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="loadRepos(${i})">${i}</a></li>`;
        }
        html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="loadRepos(${currentPage + 1})">»</a></li>`;
        ul.innerHTML = html;
    }

    async function deleteRepo(id) {
        if (!confirm('确认删除该仓库记录？')) return;
        showToast('功能暂未开放', 'info');
    }

    document.getElementById('keyword').addEventListener('keydown', e => {
        if (e.key === 'Enter') loadRepos(1);
    });

    loadRepos(1);
</script>
</body>
</html>
